name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ToolEngine.sln

      - name: Build
        run: dotnet build ToolEngine.sln -c Release --no-restore -warnaserror

      - name: Test with coverage
        run: >
          dotnet test ToolEngine.sln
          -c Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      # M16 — enforce ≥80% line coverage as a hard gate.
      # reportgenerator merges all coverage.xml files and writes a summary;
      # the shell script reads the line-rate and fails the build if below threshold.
      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:"TestResults/CoverageReport"
          -reporttypes:"Cobertura;TextSummary"

      - name: Enforce 80% coverage gate
        run: |
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' TestResults/CoverageReport/Cobertura.xml | head -1)
          echo "Line coverage: $LINE_RATE"
          THRESHOLD=0.80
          if (( $(echo "$LINE_RATE < $THRESHOLD" | bc -l) )); then
            echo "FAIL: line coverage $LINE_RATE is below threshold $THRESHOLD"
            exit 1
          fi
          echo "PASS: line coverage $LINE_RATE >= $THRESHOLD"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 30
